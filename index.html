<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Card Game</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet"/>
  </head>
  <body>
    <div id="app">

      <!-- ── HOME SCREEN ──────────────────────────────────── -->
      <div class="screen active" id="home">
        <div class="home-layout">
          <div class="home-container">
            <button class="menu-btn" onclick="showScreen('setup')">Play</button>
            <button class="menu-btn" onclick="showScreen('deck-editor')">Deck Builder</button>
          </div>
          <div class="patch-notes">
            <h3 class="patch-notes-title">Patch Notes</h3>
            <div class="patch-notes-list" id="patch-notes-list">
              <p class="patch-notes-loading">Loading...</p>
            </div>
          </div>
        </div>
      </div>

      <!-- ── SETUP SCREEN ─────────────────────────────────── -->
      <div class="screen" id="setup">
        <div class="home-container">
          <div class="setup-form">
            <label class="setup-label">Who are you?</label>
            <select class="setup-input" id="player-select">
              <option value="a">Player A</option>
              <option value="b">Player B</option>
            </select>
            <label class="setup-label">Enter your name</label>
            <input class="setup-input" type="text" id="player-name" placeholder="Your name..." />
            <label class="setup-label">Room Code</label>
            <input class="setup-input" type="text" id="room-code" placeholder="e.g. room1234..." />
            <button class="menu-btn" onclick="enterGame()">Enter the Realm</button>
            <button class="back-btn" onclick="showScreen('home')">Back</button>
          </div>
        </div>
      </div>

      <!-- ── DECK EDITOR SCREEN ───────────────────────────── -->
      <div class="screen" id="deck-editor">

        <!-- Back button fixed top right -->
        <button class="back-btn deck-editor-back" onclick="showScreen('home')">⬅ Back</button>

        <!-- Editor card detail pip -->
        <div id="editor-card-detail" class="card-detail hidden">
          <button class="card-detail-close" onclick="closeEditorCardDetail()">✕</button>
          <p class="card-detail-type" id="editor-detail-type"></p>
          <h2 class="card-detail-name" id="editor-detail-name"></h2>
          <p class="card-detail-attribute" id="editor-detail-attribute"></p>
          <div class="card-detail-stats">
            <div class="stat-block">
              <span class="stat-label">ATK</span>
              <span class="stat-value" id="editor-detail-attack"></span>
            </div>
            <div class="stat-block">
              <span class="stat-label">DEF</span>
              <span class="stat-value" id="editor-detail-defense"></span>
            </div>
            <div class="stat-block">
              <span class="stat-label">COST</span>
              <span class="stat-value" id="editor-detail-cost"></span>
            </div>
            <div class="stat-block" id="editor-detail-effect-block">
              <span class="stat-label">EFFECT</span>
            </div>
            <p class="card-detail-effect" id="editor-detail-effect"></p>
          </div>
        </div>

        <div class="editor-container">
          <div class="editor-library">
            <h2 class="editor-title">Card Library</h2>
            <input class="setup-input" type="text" id="card-search" placeholder="Search cards..." />
            <div id="library-cards" class="library-scroll"></div>
          </div>
          <div class="editor-deck">
            <h2 class="editor-title">Main Deck <span id="main-deck-count" style="font-size:0.7rem;opacity:0.6">(0)</span></h2>
            <div id="deck-cards" class="deck-scroll"></div>
            <h2 class="editor-title" style="margin-top:16px">Extra Deck <span id="extra-deck-count" style="font-size:0.7rem;opacity:0.6">(0)</span></h2>
            <div id="extra-deck-cards" class="deck-scroll"></div>
            <input class="setup-input" type="text" id="deck-name-input" placeholder="Name your deck..." style="margin-top:12px"/>
            <button class="menu-btn" onclick="saveDeck()">Save Deck</button>
            <div id="saved-decks-list"></div>
          </div>
        </div>
      </div>

      <!-- ── BOARD SCREEN ──────────────────────────────────── -->
      <div class="screen" id="board">

        <!-- Card detail panel -->
        <div id="card-detail" class="card-detail hidden">
          <button class="card-detail-close" onclick="closeCardDetail()">✕</button>
          <p class="card-detail-type" id="detail-type"></p>
          <h2 class="card-detail-name" id="detail-name"></h2>
          <p class="card-detail-attribute" id="detail-attribute"></p>
          <div class="card-detail-stats">
            <div class="stat-block">
              <span class="stat-label">ATK</span>
              <span class="stat-value" id="detail-attack"></span>
            </div>
            <div class="stat-block">
              <span class="stat-label">DEF</span>
              <span class="stat-value" id="detail-defense"></span>
            </div>
            <div class="stat-block">
              <span class="stat-label">COST</span>
              <span class="stat-value" id="detail-cost"></span>
            </div>
            <div class="stat-block" id="detail-effect-block">
              <span class="stat-label">EFFECT</span>
            </div>
            <p class="card-detail-effect" id="detail-effect"></p>
          </div>
        </div>

        <!-- Victor popup -->
        <div id="victor-popup" class="popup hidden">
          <div class="popup-inner" style="text-align:center">
            <h3 class="editor-title" style="margin-bottom:8px">⚔ Declare Victor</h3>
            <p style="font-family:'IM Fell English',serif;font-size:0.8rem;color:rgba(200,168,75,0.6);margin-bottom:16px">Who has won the duel?</p>
            <button class="btn-victor" id="victor-btn-a" onclick="declareVictor('a')"></button>
            <button class="btn-victor" id="victor-btn-b" onclick="declareVictor('b')"></button>
            <button class="back-btn" onclick="document.getElementById('victor-popup').classList.add('hidden')">Cancel</button>
          </div>
        </div>

        <!-- Deck picker popup -->
        <div id="deck-picker" class="popup hidden">
          <div class="popup-inner">
            <h3 class="editor-title">Choose a Deck</h3>
            <div id="deck-picker-list"></div>
            <button class="back-btn" onclick="closeDeckPicker()">Cancel</button>
          </div>
        </div>

        <!-- Deck viewer popup -->
        <div id="deck-viewer" class="popup hidden">
          <div class="popup-inner">
            <h3 class="editor-title" id="deck-viewer-title">Deck Contents</h3>
            <div id="deck-viewer-list"></div>
            <button class="back-btn" onclick="closeDeckViewer()">Close</button>
          </div>
        </div>

        <!-- Pile viewer popup -->
        <div id="pile-viewer" class="popup hidden">
          <div class="popup-inner">
            <h3 class="editor-title" id="pile-viewer-title"></h3>
            <div id="pile-viewer-list"></div>
            <button class="back-btn" onclick="closePileViewer()">Close</button>
          </div>
        </div>

        <!-- ── BOARD AREA + NAV PANEL ──────────────────────── -->
        <div class="board-layout">

          <div class="boards-column">

            <!-- Player B board -->
            <div class="player-board" id="playerB">
              <div class="token-bar">
                <button class="zone-btn" onclick="addToken('b')">+ Token</button>
              </div>
              <div class="player-name-tag" id="b-name">Player B</div>
              <div class="board-zones">
                <div class="side-zones">
                  <div class="zone droptarget" id="b-extradeck" data-zone="extraDeck" data-player="b" onclick="openPileViewerGlobal('b', 'extraDeck')">
                    <span class="zone-label">Extra Deck</span>
                    <span class="deck-count" id="b-extradeck-count">0</span>
                  </div>
                  <div class="zone droptarget" id="b-gallows" data-zone="gallows" data-player="b" onclick="openPileViewerGlobal('b', 'gallows')">
                    <span class="zone-label">Gallows</span>
                    <span class="deck-count" id="b-gallows-count">0</span>
                  </div>
                </div>
                <div class="main-zones">
                  <div class="zone monster-zone droptarget" id="b-monster-0" data-zone="monster" data-index="0" data-player="b"></div>
                  <div class="zone monster-zone droptarget" id="b-monster-1" data-zone="monster" data-index="1" data-player="b"></div>
                  <div class="zone monster-zone droptarget" id="b-monster-2" data-zone="monster" data-index="2" data-player="b"></div>
                  <div class="zone spell-zone droptarget" id="b-spell-0" data-zone="spell" data-index="0" data-player="b"></div>
                  <div class="zone spell-zone droptarget" id="b-spell-1" data-zone="spell" data-index="1" data-player="b"></div>
                  <div class="zone spell-zone droptarget" id="b-spell-2" data-zone="spell" data-index="2" data-player="b"></div>
                </div>
                <div class="side-zones">
                  <div class="zone droptarget" id="b-deck" data-zone="deck" data-player="b">
                    <span class="zone-label">Deck</span>
                    <span class="deck-count" id="b-deck-count">0</span>
                  </div>
                  <div class="deck-btns">
                    <button class="zone-btn" onclick="onDeckClick('b')">Draw</button>
                    <button class="zone-btn" onclick="viewDeck('b')">View</button>
                  </div>
                  <div class="zone hp-zone" id="b-hp">
                    <span class="zone-label">HP</span>
                    <span id="b-hp-value">10</span>
                    <div class="hp-buttons">
                      <button onclick="changeHp('b', 1)">+</button>
                      <button onclick="changeHp('b', -1)">-</button>
                    </div>
                  </div>
                </div>
              </div>
              <div class="hand-divider"></div>
              <div class="hand-zone droptarget" id="b-hand" data-zone="hand" data-player="b"></div>
            </div>

            <div class="board-divider"></div>

            <!-- Player A board -->
            <div class="player-board" id="playerA">
              <div class="token-bar">
                <button class="zone-btn" onclick="addToken('a')">+ Token</button>
              </div>
              <div class="player-name-tag" id="a-name">Player A</div>
              <div class="board-zones">
                <div class="side-zones">
                  <div class="zone droptarget" id="a-extradeck" data-zone="extraDeck" data-player="a" onclick="openPileViewerGlobal('a', 'extraDeck')">
                    <span class="zone-label">Extra Deck</span>
                    <span class="deck-count" id="a-extradeck-count">0</span>
                  </div>
                  <div class="zone droptarget" id="a-gallows" data-zone="gallows" data-player="a" onclick="openPileViewerGlobal('a', 'gallows')">
                    <span class="zone-label">Gallows</span>
                    <span class="deck-count" id="a-gallows-count">0</span>
                  </div>
                </div>
                <div class="main-zones">
                  <div class="zone monster-zone droptarget" id="a-monster-0" data-zone="monster" data-index="0" data-player="a"></div>
                  <div class="zone monster-zone droptarget" id="a-monster-1" data-zone="monster" data-index="1" data-player="a"></div>
                  <div class="zone monster-zone droptarget" id="a-monster-2" data-zone="monster" data-index="2" data-player="a"></div>
                  <div class="zone spell-zone droptarget" id="a-spell-0" data-zone="spell" data-index="0" data-player="a"></div>
                  <div class="zone spell-zone droptarget" id="a-spell-1" data-zone="spell" data-index="1" data-player="a"></div>
                  <div class="zone spell-zone droptarget" id="a-spell-2" data-zone="spell" data-index="2" data-player="a"></div>
                </div>
                <div class="side-zones">
                  <div class="zone droptarget" id="a-deck" data-zone="deck" data-player="a">
                    <span class="zone-label">Deck</span>
                    <span class="deck-count" id="a-deck-count">0</span>
                  </div>
                  <div class="deck-btns">
                    <button class="zone-btn" onclick="onDeckClick('a')">Draw</button>
                    <button class="zone-btn" onclick="viewDeck('a')">View</button>
                  </div>
                  <div class="zone hp-zone" id="a-hp">
                    <span class="zone-label">HP</span>
                    <span id="a-hp-value">10</span>
                    <div class="hp-buttons">
                      <button onclick="changeHp('a', 1)">+</button>
                      <button onclick="changeHp('a', -1)">-</button>
                    </div>
                  </div>
                </div>
              </div>
              <div class="hand-divider"></div>
              <div class="hand-zone droptarget" id="a-hand" data-zone="hand" data-player="a"></div>
            </div>

          </div>

          <!-- ── NAV PANEL ───────────────────────────────── -->
          <div class="nav-panel">
            <div class="player-bank-half rotated" id="b-bank-half">
              <span class="bank-label" id="b-bank-label">Player B</span>
              <span class="bank-remaining" id="b-bank-remaining">—</span>
              <span class="bank-status" id="b-bank-status"></span>
              <button class="zone-btn" onclick="chooseDeck('b')">Deck</button>
              <button class="zone-btn" onclick="triggerShuffle('b')">Shuffle</button>
            </div>
            <div class="nav-center">
              <div class="bank-orb" id="bank-orb" onclick="triggerRollBank()" style="cursor:pointer" title="Click to roll bank">
                <span id="bank-value">—</span>
              </div>
              <button class="btn-danger" onclick="triggerResetField()">Reset Field</button>
              <button class="btn-victor-nav" onclick="openVictorPopup()">⚔ Victor</button>
              <button class="back-btn" onclick="showScreen('home')">⬅ Leave</button>
            </div>
            <div class="player-bank-half" id="a-bank-half">
              <span class="bank-label" id="a-bank-label">Player A</span>
              <span class="bank-remaining" id="a-bank-remaining">—</span>
              <span class="bank-status" id="a-bank-status"></span>
              <button class="zone-btn" onclick="chooseDeck('a')">Deck</button>
              <button class="zone-btn" onclick="triggerShuffle('a')">Shuffle</button>
            </div>
          </div>

        </div>

      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
